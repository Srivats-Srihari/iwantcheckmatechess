<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="purpleField" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" /> <!-- deep purple-900 -->
      <stop offset="50%" stop-color="#1e1b4b" /> <!-- deep indigo-950 -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- slate-900 -->
    </linearGradient>

    <!-- King Core Gradient (Futuristic dark steel/black) -->
    <linearGradient id="kingSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" /> <!-- slate-700 -->
      <stop offset="50%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate-950 -->
    </linearGradient>

    <!-- Electric Cyber Glow Filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="magentaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="96" fill="url(#purpleField)" stroke="rgba(255,255,255,0.1)" stroke-width="4" />

  <!-- High-tech Outer Hexagonal Grid Pattern (Cyberpunk vibe) -->
  <path d="M256,40 L380,112 L380,256 L256,328 L132,256 L132,112 Z" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="3" stroke-dasharray="8,6" />
  <path d="M256,20 L420,115 L420,305 L256,400 L92,305 L92,115 Z" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="2" />

  <!-- Glowing Cyber Accents -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1.5" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(6,182,212,0.15)" stroke-dasharray="10,15" stroke-width="2" />

  <!-- The Black King Chess Piece (Futuristic Cyberpunk Style) -->
  <g transform="translate(128, 96)" filter="url(#cyanGlow)">
    <!-- Base / Stand -->
    <path d="M40,280 L216,280 L216,260 L40,260 Z" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="3" />
    <path d="M50,260 L206,260 L190,230 L66,230 Z" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="2" />
    
    <!-- Pedestal/Neck -->
    <path d="M80,230 L176,230 L160,110 L96,110 Z" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="3" />

    <!-- Rings on Neck -->
    <rect x="75" y="150" width="106" height="15" rx="4" fill="url(#kingSteel)" stroke="#a855f7" stroke-width="2.5" filter="url(#magentaGlow)" />
    <rect x="85" y="190" width="86" height="12" rx="3" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="2" />

    <!-- Head / Crown Base -->
    <path d="M70,110 C70,110 50,60 128,50 C206,60 186,110 186,110 Z" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="3" />

    <!-- Crown Spikes -->
    <path d="M70,80 L90,40 L110,65 L128,25 L146,65 L166,40 L186,80 Z" fill="url(#kingSteel)" stroke="#06b6d4" stroke-width="2.5" />

    <!-- Center Cross (King Symbol) -->
    <g transform="translate(113, 0)">
      <!-- Vertical bar of cross -->
      <rect x="11" y="0" width="8" height="25" fill="#a855f7" stroke="#a855f7" stroke-width="1.5" filter="url(#magentaGlow)" />
      <!-- Horizontal bar of cross -->
      <rect x="2" y="6" width="26" height="8" fill="#a855f7" stroke="#a855f7" stroke-width="1.5" filter="url(#magentaGlow)" />
    </g>

    <!-- Inner Core Cyber Glow Core Lines -->
    <line x1="128" y1="230" x2="128" y2="110" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#magentaGlow)" />
    <circle cx="128" cy="158" r="8" fill="#06b6d4" filter="url(#cyanGlow)" />
  </g>

  <!-- High-tech Grid Corners -->
  <path d="M30,80 L30,30 L80,30" fill="none" stroke="#a855f7" stroke-width="3" />
  <path d="M482,80 L482,30 L432,30" fill="none" stroke="#a855f7" stroke-width="3" />
  <path d="M30,432 L30,482 L80,482" fill="none" stroke="#a855f7" stroke-width="3" />
  <path d="M482,432 L482,482 L432,482" fill="none" stroke="#a855f7" stroke-width="3" />
</svg>
